# ============================================================
#  nginx — aiwerke.de/joschi/ (v2)
#
#  Vorlage, nicht automatisch eingespielt.
#  Ziel: /etc/nginx/sites-enabled/default — der EXISTIERENDE
#  default-vHost, der /var/www/html ausliefert.
#
#  WICHTIG: KEINEN neuen `server_name aiwerke.de`-Block anlegen —
#  der würde den bestehenden Tunnel-Traffic kapern.
# ============================================================

# --- statisch: liegt bereits als /var/www/html/joschi/ im default root ---
# (kein eigener location-Block nötig; nginx serviert es über root+index)

# --- API: diesen Block in den default server { } einfügen -----------------
location /joschi/api/ {
    proxy_pass         http://127.0.0.1:31890/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_read_timeout 15s;

    # der Service setzt eigene Security-Header; hier nur Transport
}
# --------------------------------------------------------------------------
# Nach dem Einfügen:  sudo nginx -t  &&  sudo systemctl reload nginx
# Vorher Backup:      sudo cp /etc/nginx/sites-enabled/default /tmp/nginx-default.bak.$(date +%s)
