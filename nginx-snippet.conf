# ============================================================
#  nginx-Snippet für die persönliche Website
#  Datei: nginx-snippet.conf
#
#  ACHTUNG: Nur eine Vorlage. Nicht automatisch eingespielt.
#  Manuell prüfen und einbinden, wenn du bereit bist.
#
#  Option A (empfohlen): Pfad-basiert unter aiwerke.de/joschi/
#    → Füge einen location-Block in den bestehenden aiwerke.de-vHost ein.
#    → Kein neuer Cloudflare-Tunnel-Eintrag nötig.
#
#  Option B: Eigener Subdomain-vHost (alter Ansatz, nicht mehr nötig)
#    → Eigener server-Block wie unten.
# ============================================================

# ------ OPTION A: Location-Block im bestehenden aiwerke.de-vHost ------
# In den bestehenden server { server_name aiwerke.de; } Block einfügen:
#
# location /joschi/ {
#     alias /var/www/joschi/;
#     index index.html;
#     try_files $uri $uri/ /joschi/index.html;
# }
# -----------------------------------------------------------------------

# ------ OPTION B: Eigener vHost (Subdomain) ----------------------------
server {
    listen 80;
    listen [::]:80;

    server_name joschi.aiwerke.de;

    # ---- Webroot ----
    # TODO: Passe den Pfad an, wohin du die Dateien kopierst
    root /var/www/TODO-subdomain/;
    index index.html;

    # ---- Sicherheits-Header ----
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    # 'unsafe-inline' required because index.html uses an inline <style> block (self-contained, no external CSS)
    add_header Content-Security-Policy
        "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'none'; img-src 'self' data:;"
        always;

    # ---- Caching für statische Assets ----
    location ~* \.(css|js|woff2?|ico|png|jpg|jpeg|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ---- SPA / statische Seite ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Optional: Gzip ----
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ---- Logging ----
    access_log /var/log/nginx/TODO-subdomain-access.log;
    error_log  /var/log/nginx/TODO-subdomain-error.log warn;
}
